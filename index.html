<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LifeCare Training delivers HSE-compliant first aid courses across Sussex and the South East. Emergency First Aid at Work, Mental Health First Aid, Paediatric First Aid and more. Taught by an active ambulance technician with 17+ years frontline experience." />
    <title>LifeCare Training | First Aid Courses Sussex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!--
      Hidden static forms so Netlify's build bot can detect them.
      The real, visible forms are rendered by React and submit via AJAX.
      These must list every field name that gets submitted.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
    </form>
    <form name="booking" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="courses" />
      <input type="text" name="learners" />
      <input type="text" name="delivery" />
      <input type="date" name="date" />
      <textarea name="notes"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
